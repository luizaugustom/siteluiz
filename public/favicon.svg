<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="monitorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.3" />
      <stop offset="100%" stopColor="#3b82f6" stopOpacity="0.1" />
    </linearGradient>
    <style>
      @keyframes typing {
        0%, 100% { transform: translateX(0px); }
        50% { transform: translateX(-5px); }
      }
      @keyframes mouseClick {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(0.9); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
      #leftArm-favicon {
        animation: typing 2s ease-in-out infinite;
        transform-origin: 192px 135px;
      }
      #rightArm-favicon {
        animation: mouseClick 2.5s ease-in-out infinite;
        transform-origin: 250px 140px;
      }
      #screenGlow-favicon {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Background - Monitor -->
  <rect
    x="80"
    y="120"
    width="240"
    height="160"
    rx="16"
    fill="url(#monitorGradient)"
    stroke="#3b82f6"
    strokeWidth="3"
  />
  <rect
    x="100"
    y="140"
    width="200"
    height="120"
    rx="8"
    fill="#0a0e27"
  />

  <!-- Monitor Stand -->
  <rect x="170" y="290" width="60" height="50" fill="#3b82f6" />
  <ellipse cx="200" cy="340" rx="45" ry="12" fill="#3b82f6" opacity="0.6" />

  <!-- Person Head -->
  <circle cx="180" cy="100" r="30" fill="#d4a574" />
  <!-- Hair -->
  <path
    d="M 150 80 Q 180 50 210 80"
    fill="#8b6f47"
  />
  <!-- Face Details -->
  <circle cx="170" cy="95" r="4" fill="#333" />
  <circle cx="190" cy="95" r="4" fill="#333" />
  <path d="M 180 105 Q 180 108 185 110" stroke="#333" strokeWidth="2" fill="none" />

  <!-- Body -->
  <ellipse cx="220" cy="160" rx="35" ry="50" fill="#3b82f6" />

  <!-- Arms - Left arm on keyboard -->
  <g id="leftArm-favicon">
    <line x1="192" y1="135" x2="140" y2="180" stroke="#d4a574" strokeWidth="8" strokeLinecap="round" />
    <circle cx="138" cy="182" r="10" fill="#d4a574" />
  </g>

  <!-- Arms - Right arm on mouse -->
  <g id="rightArm-favicon">
    <line x1="250" y1="140" x2="300" y2="160" stroke="#d4a574" strokeWidth="8" strokeLinecap="round" />
    <circle cx="302" cy="161" r="10" fill="#d4a574" />
  </g>

  <!-- Keyboard -->
  <rect x="130" y="190" width="160" height="30" rx="4" fill="#1e1e2e" stroke="#3b82f6" strokeWidth="2" />
  <circle cx="145" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="160" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="175" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="190" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="205" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="220" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="235" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="250" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="265" cy="205" r="3" fill="#3b82f6" opacity="0.7" />
  <circle cx="280" cy="205" r="3" fill="#3b82f6" opacity="0.7" />

  <!-- Mouse -->
  <ellipse cx="310" cy="190" rx="20" ry="28" fill="#1e1e2e" stroke="#3b82f6" strokeWidth="2" />
  <circle cx="310" cy="175" r="8" fill="#3b82f6" opacity="0.5" />

  <!-- Screen Glow Effect -->
  <rect
    x="100"
    y="140"
    width="200"
    height="120"
    rx="8"
    fill="none"
    stroke="#3b82f6"
    strokeWidth="1"
    opacity="0.3"
  />

  <!-- Animated Light on Screen -->
  <g id="screenGlow-favicon">
    <rect
      x="110"
      y="150"
      width="80"
      height="30"
      fill="#3b82f6"
      opacity="0.2"
    />
    <rect
      x="210"
      y="200"
      width="70"
      height="40"
      fill="#3b82f6"
      opacity="0.15"
    />
  </g>
</svg>
